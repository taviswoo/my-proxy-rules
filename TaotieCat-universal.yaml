# ==========================================
# TaotieCat 通用覆写文件
# 适用：Mihomo / Clash Meta 及支持 YAML 覆写合并的客户端
# 依赖基础配置中的 proxy-providers.Airport
# ==========================================

proxy-groups:
  - name: 全球加速
    type: select
    proxies:
      - 自动选择
      - 香港节点
      - 日本节点
      - 美国节点
      - 美国家宽
      - 狮城节点
      - 德国节点
      - 马来节点
      - 韩国节点

  - name: 国际媒体
    type: select
    proxies:
      - 自动选择
      - 香港节点
      - 日本节点
      - 美国节点
      - 美国家宽
      - 狮城节点
      - 德国节点
      - 马来节点
      - 韩国节点

  - name: Emby服务
    type: select
    proxies:
      - 自动选择
      - 香港节点
      - 日本节点
      - 美国节点
      - 狮城节点
      - 马来节点
      - 德国节点

  - name: AI分流
    type: select
    proxies:
      - 美国家宽
      - 美国节点
      - 自动选择

  - name: 社交链路
    type: select
    proxies:
      - 自动选择
      - 香港节点
      - 美国节点
      - 日本节点
      - 狮城节点
      - 德国节点
      - 马来节点
      - 韩国节点

  - name: 自动选择
    type: url-test
    include-all: true
    use:
      - Airport
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    lazy: true

  - name: 香港节点
    type: url-test
    include-all: true
    use:
      - Airport
    filter: "港|HK|(?i)Hong"
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    lazy: true

  - name: 日本节点
    type: url-test
    include-all: true
    use:
      - Airport
    filter: "日|东京|JP|(?i)Japan"
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    lazy: true

  - name: 美国节点
    type: url-test
    include-all: true
    use:
      - Airport
    filter: "(?i)^(?!.*US-R-).*(美|US|States|American)"
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    lazy: true

  - name: 美国家宽
    type: select
    include-all: true
    use:
      - Airport
    filter: "US-R-"
    url: https://cp.cloudflare.com/generate_204

  - name: 狮城节点
    type: url-test
    include-all: true
    use:
      - Airport
    filter: "新|坡|SG|(?i)Singapore"
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    lazy: true

  - name: 德国节点
    type: url-test
    include-all: true
    use:
      - Airport
    filter: "德|DE|(?i)Germany"
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    lazy: true

  - name: 韩国节点
    type: url-test
    include-all: true
    use:
      - Airport
    filter: "韩|KR|(?i)Korea|Seoul"
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    lazy: true

  - name: 马来节点
    type: url-test
    include-all: true
    use:
      - Airport
    filter: "马来|MY|(?i)Malaysia"
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    lazy: true

