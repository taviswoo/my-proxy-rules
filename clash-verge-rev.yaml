proxy-groups:
  # 分流分组
  - name: 全球加速
    type: select
    proxies:
      - 自动选择
      - 日本节点
      - 美国节点
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Global.png

  - name: 国际媒体
    type: select
    proxies:
      - 自动选择
      - 日本节点
      - 美国节点
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Streaming.png

  - name: Emby服务
    type: select
    proxies:
      - 自动选择
      - 日本节点
      - 美国节点
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Emby.png

  - name: AI服务
    type: select
    proxies:
      - 自动选择
      - 日本节点
      - 美国节点
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/AI.png

  - name: TG服务
    type: select
    proxies:
      - 自动选择
      - 日本节点
      - 美国节点
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Chat.png

  # 节点分组（Clash-Rev 完全兼容）
  - name: 自动选择
    type: url-test
    interval: 1800
    tolerance: 100
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Urltest.png

  - name: 香港节点
    type: url-test
    filter: "(?i)HK|Hong|港"
    interval: 1800
    tolerance: 100
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/HK.png

  - name: 日本节点
    type: url-test
    filter: "(?i)JP|Japan|日|东京"
    interval: 1800
    tolerance: 100
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/JP.png

  - name: 台湾节点
    type: url-test
    filter: "(?i)TW|Taiwan|台|湾"
    interval: 1800
    tolerance: 100
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/TW.png

  - name: 美国节点
    type: url-test
    filter: "(?i)US|United|States|美|America"
    interval: 1800
    tolerance: 100
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/US.png

  - name: 美国家宽
    type: url-test
    filter: "(?i)US|R-|Residential|家宽|America"
    interval: 1800
    tolerance: 100
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/US.png

# 分流规则
rule-providers:
  AdBlock:
    behavior: domain
    interval: 86400
    format: text
    type: http
    url: https://raw.githubusercontent.com/Cats-Team/AdRules/main/adrules_domainset.txt
    path: ./ruleset/AdBlock.txt

  Youtube:
    behavior: classical
    interval: 86400
    format: yaml
    type: http
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.yaml
    path: ./ruleset/Youtube.yaml

  OpenAi:
    behavior: classical
    interval: 86400
    format: yaml
    type: http
    url: https://gist.githubusercontent.com/ddgksf2013/cb4121e8b5c5d865cc949cb8120320c4/raw/Ai.yaml
    path: ./ruleset/OpenAi.yaml

  Emby:
    behavior: classical
    interval: 86400
    format: yaml
    type: http
    url: https://raw.githubusercontent.com/ddgksf2013/Filter/master/Emby.yaml
    path: ./ruleset/Emby.yaml

  BiliBili:
    behavior: classical
    interval: 86400
    format: yaml
    type: http
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/BiliBili/BiliBili.yaml
    path: ./ruleset/BiliBili.yaml

  GlobalMedia:
    behavior: classical
    interval: 86400
    format: yaml
    type: http
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GlobalMedia/GlobalMedia_Classical.yaml
    path: ./ruleset/GlobalMedia.yaml

  Github:
    behavior: classical
    interval: 86400
    format: yaml
    type: http
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml
    path: ./ruleset/Github.yaml

  Microsoft:
    behavior: classical
    interval: 86400
    format: yaml
    type: http
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Microsoft/Microsoft.yaml
    path: ./ruleset/Microsoft.yaml

  Google:
    behavior: classical
    interval: 86400
    format: yaml
    type: http
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.yaml
    path: ./ruleset/Google.yaml

  Telegram:
    behavior: classical
    interval: 86400
    format: yaml
    type: http
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml
    path: ./ruleset/Telegram.yaml

  Twitter:
    behavior: classical
    interval: 86400
    format: yaml
    type: http
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Twitter/Twitter.yaml
    path: ./ruleset/Twitter.yaml

  ChinaIP:
    behavior: ipcidr
    interval: 86400
    format: yaml
    type: http
    url: https://raw.githubusercontent.com/soffchen/GeoIP2-CN/release/clash-rule-provider.yml
    path: ./ruleset/ChinaIP.yaml

  Messaging:
    behavior: classical
    interval: 86400
    format: yaml
    type: http
    url: https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/Ruleset/Chat.yaml
    path: ./ruleset/Messaging.yaml

# 分流策略
rules:
  - RULE-SET,Messaging,TG服务
  - RULE-SET,OpenAi,美国家宽
  - RULE-SET,Emby,Emby服务
  - RULE-SET,Youtube,国际媒体
  - RULE-SET,GlobalMedia,国际媒体
  - RULE-SET,Github,全球加速
  - RULE-SET,Microsoft,全球加速
  - RULE-SET,Google,全球加速
  - RULE-SET,Telegram,全球加速
  - RULE-SET,Twitter,全球加速
  - RULE-SET,ChinaIP,DIRECT
  - GEOIP,CN,DIRECT
  - MATCH,全球加速
