proxy-groups:
  # 分流分组
  - {name: 全球加速, type: select, proxies: [自动选择, 日本节点, 美国节点], icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Global.png }
  - {name: 国际媒体, type: select, proxies: [自动选择, 日本节点, 美国节点], icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Streaming.png }
  - {name: Emby服务, type: select, proxies: [自动选择, 日本节点, 美国节点], icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Emby.png }
  - {name: AI服务,   type: select, proxies: [自动选择, 日本节点, 美国节点], icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/AI.png }
  - {name: 聊天服务, type: select, proxies: [自动选择, 日本节点, 美国节点], icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Chat.png }

  # 节点分组
  - {name: 自动选择, type: url-test, interval: 28800, tolerance: 100, icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Urltest.png }
  - {name: 香港节点, type: url-test, interval: 28800, tolerance: 100, filter: "港|HK|(?i)Hong", icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/HK.png }
  - {name: 日本节点, type: url-test, interval: 28800, tolerance: 100, filter: "日|东京|JP|(?i)Japan", icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/JP.png }
  - {name: 台湾节点, type: url-test, interval: 28800, tolerance: 100, filter: "台|湾|TW|(?i)Taiwan", icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/TW.png }
  - {name: 美国节点, type: url-test, interval: 28800, tolerance: 100, filter: "美|US|(?i)States|American", icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/US.png }
  - {name: 狮城节点, type: url-test, interval: 28800, tolerance: 100, filter: "新|坡|SG|(?i)Singapore", icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/SG.png }
  - {name: 美国家宽, type: select,   interval: 28800, tolerance: 100, filter: "US-R-", icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/US.png }

