# ========================================
# 分流分组 - 只显示指定的地区分组
# ========================================
proxy-groups:
  - name: 全球加速
    type: select
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Global.png
    remnawave:
      include-proxies: false
    proxies:
      - 自动选择
      - 香港节点
      - 日本节点
      - 台湾节点
      - 美国节点
      - 狮城节点
      - 德国节点
      - DIRECT

  - name: 国际媒体
    type: select
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Streaming.png
    remnawave:
      include-proxies: false
    proxies:
      - 自动选择
      - 香港节点
      - 日本节点
      - 美国节点
      - 狮城节点
      - 德国节点

  - name: Emby服务
    type: select
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Emby.png
    remnawave:
      include-proxies: false
    proxies:
      - 自动选择
      - 香港节点
      - 日本节点
      - 美国节点
      - 狮城节点
      - 德国节点

  - name: AI分流
    type: select
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/OpenAI.png
    remnawave:
      include-proxies: false
    proxies:
      - 自动选择
      - 美国节点
      - 日本节点
      - 狮城节点
      - 德国节点

  - name: 聊天服务
    type: select
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Telegram.png
    remnawave:
      include-proxies: false
    proxies:
      - 自动选择
      - 美国节点
      - 日本节点
      - 狮城节点
      - 德国节点

  # ========================================
  # 智能选择分组
  # ========================================
  - name: 自动选择
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    lazy: true
    include-all: true
    remnawave:
      include-proxies: false
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Urltest.png
    proxies:
      # LEAVE THIS LINE!

  # ========================================
  # 地区节点分组 - 自动筛选
  # ========================================
  - name: 香港节点
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    lazy: true
    include-all: true
    filter: "港|HK|(?i)Hong"
    remnawave:
      include-proxies: false
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/HK.png

  - name: 日本节点
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    lazy: true
    include-all: true
    filter: "日|东京|JP|(?i)Japan"
    remnawave:
      include-proxies: false
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/JP.png

  - name: 台湾节点
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    lazy: true
    include-all: true
    filter: "台|湾|TW|(?i)Taiwan"
    remnawave:
      include-proxies: false
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/TW.png

  - name: 美国节点
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    lazy: true
    include-all: true
    filter: "美|US|(?i)States|American"
    remnawave:
      include-proxies: false
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/US.png

  - name: 狮城节点
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    lazy: true
    include-all: true
    filter: "新|坡|SG|(?i)Singapore"
    remnawave:
      include-proxies: false
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/SG.png

  - name: 德国节点
    type: url-test
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    lazy: true
    include-all: true
    filter: "德|🇩🇪|DE|(?i)Germany"
    remnawave:
      include-proxies: false
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/DE.png

  - name: 美国家宽
    type: select
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    lazy: true
    include-all: true
    filter: "US-R-"
    remnawave:
      include-proxies: false
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/US.png

