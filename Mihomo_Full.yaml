# ==========================================
# 节点（Remnawave 自动注入 + Sub-Store）
# ==========================================
proxies: []

proxy-providers:
  Airport:
    type: http
    url: "YOUR_SUBSTORE_URL_HERE"
    interval: 3600
    path: ./providers/airport.yaml
    health-check:
      enable: true
      interval: 600
      url: https://cp.cloudflare.com/generate_204

# ==========================================
# 代理组（旗舰版）
# ==========================================
proxy-groups:

  # 手动选择分流组
  - name: 全球加速
    type: select
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Global.png
    proxies:
      - 自动选择
      - 香港节点
      - 日本节点
      - 美国节点
      - 狮城节点
      - 德国节点

  - name: 国际媒体
    type: select
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Streaming.png
    proxies:
      - 自动选择
      - 香港节点
      - 日本节点
      - 美国节点
      - 狮城节点
      - 德国节点

  - name: Emby服务
    type: select
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Emby.png
    proxies:
      - 自动选择
      - 香港节点
      - 日本节点
      - 美国节点
      - 狮城节点
      - 德国节点

  - name: AI分流
    type: select
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/OpenAI.png
    proxies:
      - 美国家宽

  - name: 通信链路
    type: select
    icon: https://raw.githubusercontent.com/Orz-3/mini/master/Color/Telegram.png
    proxies:
      - 自动选择
      - 香港节点
      - 美国节点
      - 日本节点
      - 狮城节点
      - 德国节点

  # 自动选择
  - name: 自动选择
    type: url-test
    include-all: true
    use:
      - Airport
    remnawave:
      include-proxies: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300
    tolerance: 100
    lazy: true

  # 地区分组
  - name: 香港节点
    type: url-test
    include-all: true
    use:
      - Airport
    filter: "港|HK|(?i)Hong"
    remnawave:
      include-proxies: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300

  - name: 日本节点
    type: url-test
    include-all: true
    use:
      - Airport
    filter: "日|东京|JP|(?i)Japan"
    remnawave:
      include-proxies: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300

  - name: 美国节点
    type: url-test
    include-all: true
    use:
      - Airport
    filter: "美|US|(?i)States|American"
    remnawave:
      include-proxies: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300

  - name: 狮城节点
    type: url-test
    include-all: true
    use:
      - Airport
    filter: "新|坡|SG|(?i)Singapore"
    remnawave:
      include-proxies: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300

  - name: 台湾节点
    type: url-test
    include-all: true
    use:
      - Airport
    filter: "台|湾|TW|(?i)Taiwan"
    remnawave:
      include-proxies: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300

  - name: 德国节点
    type: url-test
    include-all: true
    use:
      - Airport
    filter: "德|DE|(?i)Germany"
    remnawave:
      include-proxies: true
    url: https://cp.cloudflare.com/generate_204
    interval: 300

  - name: 美国家宽
    type: select
    include-all: true
    use:
      - Airport
    filter: "US-R-"
    remnawave:
      include-proxies: true

  # Remnawave 主组
  - name: Remnawave
    type: select
    include-all: true
    use:
      - Airport
    remnawave:
      include-proxies: true
