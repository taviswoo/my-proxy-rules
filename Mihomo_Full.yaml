# ==========================================
# 完全体 rules（旗舰版）
# ==========================================
rules:

  # AI
  - RULE-SET,OpenAi,AI分流
  - RULE-SET,Claude,AI分流
  - RULE-SET,Gemini,AI分流
  - RULE-SET,BingAI,AI分流

  # 流媒体（国际）
  - RULE-SET,Netflix,国际媒体
  - RULE-SET,Disney,国际媒体
  - RULE-SET,HBO,国际媒体
  - RULE-SET,Hulu,国际媒体
  - RULE-SET,PrimeVideo,国际媒体
  - RULE-SET,Spotify,国际媒体
  - RULE-SET,Youtube,国际媒体
  - RULE-SET,GlobalMedia,国际媒体
  - RULE-SET,Streaming,国际媒体

  # 流媒体（国内）
  - RULE-SET,StreamingCN,DIRECT

  # Emby
  - RULE-SET,Emby,Emby服务

  # 社交
  - RULE-SET,Telegram,通信链路
  - RULE-SET,Twitter,全球加速
  - RULE-SET,TikTok,国际媒体
  - RULE-SET,Instagram,全球加速
  - RULE-SET,Facebook,全球加速
  - RULE-SET,Reddit,全球加速
  - RULE-SET,Discord,通信链路

  # 游戏
  - RULE-SET,Steam,全球加速
  - RULE-SET,Epic,全球加速
  - RULE-SET,Battle,全球加速
  - RULE-SET,PSN,全球加速
  - RULE-SET,Xbox,全球加速
  - RULE-SET,Nintendo,全球加速

  # 开发者
  - RULE-SET,Github,全球加速
  - RULE-SET,GitLab,全球加速
  - RULE-SET,Docker,全球加速
  - RULE-SET,NPM,全球加速
  - RULE-SET,PyPI,全球加速

  # 金融
  - RULE-SET,BankUS,美国家宽

  # 隐私 / 恶意
  - RULE-SET,Privacy,REJECT
  - RULE-SET,Malware,REJECT
  - RULE-SET,Tracker,REJECT

  # 基础直连
  - RULE-SET,Direct,DIRECT
  - RULE-SET,Lan,DIRECT
  - RULE-SET,ChinaIP,DIRECT

  # GEOIP 兜底
  - GEOIP,CN,DIRECT

  # 最终兜底
  - MATCH,全球加速
